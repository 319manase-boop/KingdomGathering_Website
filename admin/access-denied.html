<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied | Kingdom Gathering Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #060606; color: #f9f7ef; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .access-denied-container { text-align: center; padding: 2rem; }
        .access-denied-code { font-size: 5rem; font-weight: 800; color: #ffd95d; margin-bottom: 1rem; }
        .access-denied-title { font-size: 2rem; margin-bottom: 1rem; }
        .access-denied-message { margin-bottom: 2rem; color: rgba(255,255,255,0.7); }
        .access-denied-link { color: #ffd95d; text-decoration: none; padding: 0.75rem 1.5rem; border: 1px solid #ffd95d; border-radius: 8px; display: inline-block; }
        .access-denied-link:hover { background: rgba(212,175,55,0.1); }
    </style>
</head>
<body>
    <!-- Access denied page is intentionally not RBAC-protected. -->
    <div class="access-denied-container">
        <div class="access-denied-code">403</div>
        <h1 class="access-denied-title">Access Denied</h1>
        <p class="access-denied-message">You do not have permission to access this page.</p>

        <a href="dashboard.html" class="access-denied-link">Back to Dashboard</a>

        <button onclick="clearSession()" class="access-denied-link mt-3" style="background: transparent;">
            Sign Out & Return to Login
        </button>
    </div>

    <script>
        function clearSession() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = "./login.html";
        }
    </script>
</body>
</html>

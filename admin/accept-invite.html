<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Invite | Kingdom Gathering Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/admin-auth.css">
    <link rel="icon" href="../images/logo.png" type="image/png">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-xl-5 col-lg-6 col-md-8">
                <div class="admin-auth-card">
                    <div class="text-center auth-header">
                        <img src="../images/logo.png" alt="Kingdom Gathering Logo" class="login-brand">
                        <h1 class="mb-2">Accepting Your Invite</h1>
                        <p class="mb-0">Please wait while we validate your secure link.</p>
                    </div>
                    <div id="alertContainer"></div>
                    <div class="text-center">
                        <div class="spinner-border text-warning" role="status"><span class="visually-hidden">Loading...</span></div>
                        <p class="mt-3 text-muted">If you are not redirected automatically, use the button below.</p>
                        <a id="manualLink" href="./update-password.html" class="btn btn-primary-gold px-4 py-2 mt-2 d-none">Continue to Create Password</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabaseClient.js"></script>
    <script src="/js/admin/accept-invite.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Gathering Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../images/logo.png" type="image/png">
    <style>
        body {
            background: #080808;
            color: #f6f2e8;
            min-height: 100vh;
        }
        .admin-login-card {
            background: rgba(18, 18, 18, 0.96);
            border: 1px solid rgba(212, 175, 55, 0.18);
            border-radius: 28px;
            box-shadow: 0 28px 80px rgba(0,0,0,0.35);
            padding: 2.5rem;
        }
        .admin-login-card h1 {
            color: #fff;
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
        }
        .admin-login-card p {
            color: rgba(255,255,255,0.78);
        }
        .form-control {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(212,175,55,0.16);
            color: #f6f2e8;
            border-radius: 14px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(212,175,55,0.16);
            border-color: rgba(212,175,55,0.35);
        }
        .btn-signin {
            background: linear-gradient(135deg, #d4af37, #ffd95d);
            border: none;
            color: #080808;
            font-weight: 700;
            border-radius: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(212,175,55,0.35);
        }
        .login-brand {
            width: 90px;
            height: auto;
            margin-bottom: 1.25rem;
        }
        .login-header {
            border-bottom: 1px solid rgba(212,175,55,0.18);
            padding-bottom: 1.35rem;
            margin-bottom: 1.75rem;
        }
        .login-alert {
            border-radius: 16px;
        }
        .link-forgot {
            color: #ffd95d;
        }
        .link-forgot:hover {
            color: #ffffff;
            text-decoration: none;
        }
        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-xl-5 col-lg-6 col-md-8">
                <div class="admin-login-card">
                    <div class="text-center login-header">
                        <img src="../images/logo.png" alt="Kingdom Gathering Logo" class="login-brand">
                        <h1 class="mb-2">Kingdom Gathering Administration</h1>
                        <p class="mb-0">Authorized Personnel Only</p>
                    </div>
                    <div id="alertContainer"></div>
                    <form id="adminLoginForm" novalidate>
                        <div class="mb-4">
                            <label for="adminEmail" class="form-label">Email</label>
                            <input type="email" id="adminEmail" class="form-control" placeholder="you@kingdomgathering.org" required>
                        </div>
                        <div class="mb-4">
                            <label for="adminPassword" class="form-label">Password</label>
                            <input type="password" id="adminPassword" class="form-control" placeholder="Enter your password" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <a href="javascript:void(0);" class="link-forgot">Forgot Password?</a>
                            <button type="submit" id="signInButton" class="btn btn-signin px-4 py-2">
                                <span id="signInText">Sign In</span>
                                <span id="signInSpinner" class="spinner-border spinner-border-sm text-dark ms-2 d-none" role="status" aria-hidden="true"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabaseClient.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>

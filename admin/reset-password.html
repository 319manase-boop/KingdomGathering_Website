<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Kingdom Gathering Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/admin-auth.css">
    <link rel="icon" href="../images/logo.png" type="image/png">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-xl-5 col-lg-6 col-md-8">
                <div class="admin-auth-card">
                    <div class="text-center auth-header">
                        <img src="../images/logo.png" alt="Kingdom Gathering Logo" class="login-brand">
                        <h1 class="mb-2">Reset Your Password</h1>
                        <p class="mb-0">Enter your email to receive a secure link and set a new password.</p>
                    </div>
                    <div id="alertContainer"></div>
                    <form id="resetForm" novalidate>
                        <div class="mb-4">
                            <label for="resetEmail" class="form-label">Email address</label>
                            <input type="email" id="resetEmail" class="form-control" placeholder="you@kingdomgathering.org" autocomplete="email" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <a href="./login.html" class="link-gold">Back to login</a>
                            <button type="submit" id="resetButton" class="btn btn-primary-gold px-4 py-2">
                                <span id="resetText">Send Reset Link</span>
                                <span id="resetSpinner" class="spinner-border spinner-border-sm text-dark ms-2 d-none" role="status" aria-hidden="true"></span>
                            </button>
                        </div>
                    </form>
                    <p class="small text-muted mb-0">You will receive an email with a link to set your password. Check your spam folder if you do not receive it shortly.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabaseClient.js"></script>
    <script src="/js/admin/reset-password.js"></script>
</body>
</html>
